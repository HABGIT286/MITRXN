<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>عناوين تقارير الطلبة</title>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@font-face { font-family: 'TitelFont'; src: url('TITEL.ttf'); }
@font-face { font-family: 'WriteFont'; src: url('WRITE.otf'); }

body{
    margin:0;
    font-family:'WriteFont',sans-serif;
    background:url('H.jpg') no-repeat center center fixed;
    background-size:cover;
}

.header{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    padding:20px;
    background:#1e3a5f;
    color:white;
    font-family:'TitelFont',sans-serif;
}

.top-right{
    position:absolute;
    top:20px;
    left:20px;
    font-size:14px;
}

.container{
    width:500px;
    margin:100px auto;
    background:rgba(255,255,255,0.95);
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.rank{
    text-align:center;
    margin-bottom:20px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-bottom:10px;
    cursor:pointer;
}

.save-btn{background:#1e3a5f;color:white;}
.change-btn{background:#b38b00;color:white;}
.info-btn{background:#006b38;color:white;}
.show-btn{background:#5a2e8a;color:white;}

#msg{margin-top:10px;font-weight:bold;}
</style>
</head>
<body>

<div class="header">عناوين تقارير الطلبة</div>

<div class="top-right">
قسم إدارة الأعمال<br>
طلبة المرحلة الثانية<br>
الدراسة مسائي<br>
قاعة (ب)
</div>

<div class="container">

<div class="rank" id="rank">رتبتك هنا</div>

<input id="studentName" placeholder="اسم الطالب">
<input id="reportTitle" placeholder="عنوان التقرير">
<input id="subjectName" placeholder="المادة الدراسية">

<button class="save-btn" onclick="saveData()">حفظ</button>
<button class="change-btn" onclick="changeTitle()">تعديل العنوان</button>
<button class="info-btn" onclick="showMyInfo()">معلوماتي</button>
<button class="show-btn" onclick="showAllTitles()">عناوين التقارير</button>

<div id="msg"></div>

</div>

<script>
const SUPABASE_URL = "https://nbaedfesrclwvywsiqhr.supabase.co";
const SUPABASE_KEY = "sb_publishable_qmIUC4Rkb-VGOek8qkVqFg_Sn4x3WjI";

// هذا ينشئ العميل للاتصال بـ Supabase
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// الرابط للـ Telegram Bot
const TELEGRAM_FN_URL = "https://nbaedfesrclwvywsiqhr.supabase.co/functions/v1/send_tele";

async function saveData(){
    const name = studentName.value.trim();
    const title = reportTitle.value.trim();
    const subject = subjectName.value.trim();
    const msg = document.getElementById("msg");

    if(!name || !title || !subject){
        msg.innerHTML="<span style='color:red'>املأ جميع الحقول</span>";
        return;
    }

    // منع تكرار الاسم
    const { data:nameCheck } = await sb.from("students").select("id").eq("name",name);
    if(nameCheck.length>0){
        msg.innerHTML="<span style='color:red'>اسم الطالب مسجل مسبقاً</span>";
        return;
    }

    // منع تكرار العنوان
    const { data:titleCheck } = await sb.from("students").select("id").eq("title",title);
    if(titleCheck.length>0){
        msg.innerHTML="<span style='color:red'>عنوان التقرير مستخدم مسبقاً</span>";
        return;
    }

    const { error } = await sb.from("students").insert([{name,title,subject}]);

    if(error){
        msg.innerHTML="<span style='color:red'>"+error.message+"</span>";
        return;
    }

    msg.innerHTML="<span style='color:green'>تم الحفظ بنجاح</span>";

    await updateRank(name);
    await showMyInfo();

    // إرسال للبوت
    fetch(TELEGRAM_FN_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name,title,subject})
    });
}

async function showMyInfo(){
    const name = studentName.value.trim();
    if(!name) return alert("ادخل اسمك أولاً");

    const { data,error } = await sb.from("students").select("*").eq("name",name).single();
    if(error) return alert("لم يتم العثور على بياناتك");

    alert(
        "اسم الطالب: "+data.name+
        "\nعنوان التقرير: "+data.title+
        "\nالمادة: "+data.subject+
        "\nتاريخ التسجيل: "+data.created_at
    );
}

async function showAllTitles(){
    const { data,error } = await sb.from("students").select("*").order("created_at",{ascending:true});
    if(error || data.length===0) return alert("لا توجد بيانات");

    let list="";
    data.forEach(s=>{
        list+="👤 "+s.name+"\n";
        list+="📝 "+s.title+"\n";
        list+="📚 "+s.subject+"\n";
        list+="----------------------\n";
    });

    alert(list);
}

async function changeTitle(){
    const name = studentName.value.trim();
    if(!name) return alert("ادخل اسمك أولاً");

    const newTitle = prompt("ادخل العنوان الجديد");
    if(!newTitle) return;

    const { data:titleCheck } = await sb.from("students").select("id").eq("title",newTitle);
    if(titleCheck.length>0) return alert("هذا العنوان مستخدم مسبقاً");

    const { error } = await sb.from("students").update({title:newTitle}).eq("name",name);
    if(error) alert("حدث خطأ");
    else alert("تم تعديل العنوان بنجاح");
}

async function updateRank(name){
    const { data } = await sb.from("students").select("name").order("created_at",{ascending:true});
    const index = data.findIndex(s=>s.name===name);
    if(index>=0){
        document.getElementById("rank").innerText="ترتيبك: "+(index+1);
    }
}
</script>

</body>
</html>
