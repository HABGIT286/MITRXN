<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عناوين تقارير الطلبة</title>
<style>
@font-face { font-family: 'TitelFont'; src: url('TITEL.ttf'); }
@font-face { font-family: 'WriteFont'; src: url('WRITE.otf'); }

*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --gold: #f5c842;
  --gold2: #e0a800;
  --blue-dark: #0a1628;
  --blue-mid: #1e3a5f;
  --blue-light: #2d6cdf;
  --glass-bg: rgba(255,255,255,0.08);
  --glass-border: rgba(255,255,255,0.18);
  --neon: #4fc3f7;
}

html, body{
  height:100%;
  width:100%;
  overflow:hidden;
  font-family:'WriteFont',sans-serif;
  background:#000;
}

/* ===== VIDEO BG ===== */
#bgVideo{
  position:fixed;
  right:0;bottom:0;
  min-width:100%;min-height:100%;
  width:auto;height:auto;
  z-index:-2;
  object-fit:cover;
  filter: brightness(0.4) saturate(1.2);
}

/* ===== PARTICLES ===== */
#particles-canvas{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:-1;
  pointer-events:none;
}

/* ===== OVERLAY GRADIENT ===== */
.overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:-1;
  background: radial-gradient(ellipse at 50% 0%, rgba(45,108,223,0.25) 0%, transparent 70%),
              radial-gradient(ellipse at 100% 100%, rgba(245,200,66,0.1) 0%, transparent 60%),
              linear-gradient(180deg, rgba(10,22,40,0.6) 0%, rgba(0,0,0,0.3) 100%);
}

/* ===== LOADING SCREEN ===== */
#loader{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: #000;
  z-index:9999;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition: opacity 0.8s ease, transform 0.8s ease;
}

#loader .loader-logo{
  font-family:'TitelFont',sans-serif;
  font-size:42px;
  color:#fff;
  text-align:center;
  opacity:0;
  animation: logoAppear 1s ease 0.3s forwards;
}

#loader .loader-logo span{
  color: var(--gold);
  text-shadow: 0 0 30px rgba(245,200,66,0.8);
}

#loader .loader-bar-wrap{
  margin-top:30px;
  width:250px;
  height:4px;
  background: rgba(255,255,255,0.15);
  border-radius:10px;
  overflow:hidden;
}

#loader .loader-bar{
  height:100%;
  background: linear-gradient(90deg, var(--gold), var(--blue-light));
  border-radius:10px;
  width:0%;
  animation: loadBar 1.8s ease forwards;
}

@keyframes logoAppear{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
@keyframes loadBar{
  0%{width:0%;}
  100%{width:100%;}
}

/* ===== HEADER ===== */
.header{
  position:relative;
  text-align:center;
  padding:22px 20px;
  font-family:'TitelFont',sans-serif;
  font-size:30px;
  color:#fff;
  background: linear-gradient(90deg, rgba(10,22,40,0.9) 0%, rgba(30,58,95,0.95) 50%, rgba(10,22,40,0.9) 100%);
  border-bottom: 1px solid rgba(245,200,66,0.4);
  box-shadow: 0 4px 30px rgba(0,0,0,0.5), 0 1px 0 rgba(245,200,66,0.2);
  letter-spacing: 1px;
  opacity:0;
  transform: translateY(-60px);
  animation: slideDown 0.7s cubic-bezier(.22,1,.36,1) 2s forwards;
}

.header::before{
  content:'';
  position:absolute;
  bottom:0;left:50%;
  transform:translateX(-50%);
  width:200px;height:2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.header-icon{
  display:inline-block;
  margin-left:10px;
  animation: spin360 3s linear infinite;
  color: var(--gold);
  filter: drop-shadow(0 0 8px rgba(245,200,66,0.8));
}

@keyframes spin360{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}
@keyframes slideDown{
  to{opacity:1; transform:translateY(0);}
}

/* ===== MAIN CONTAINER ===== */
.page-wrap{
  height: calc(100vh - 80px);
  overflow-y: auto;
  padding: 30px 15px 40px;
  scrollbar-width: thin;
  scrollbar-color: rgba(245,200,66,0.4) transparent;
}
.page-wrap::-webkit-scrollbar{width:5px;}
.page-wrap::-webkit-scrollbar-track{background:transparent;}
.page-wrap::-webkit-scrollbar-thumb{background:rgba(245,200,66,0.4);border-radius:10px;}

.container{
  width:680px;
  max-width:100%;
  margin:0 auto;
  background: rgba(10,22,40,0.7);
  border: 1px solid rgba(255,255,255,0.12);
  padding:35px;
  border-radius:24px;
  box-shadow:
    0 25px 60px rgba(0,0,0,0.7),
    0 0 0 1px rgba(245,200,66,0.1),
    inset 0 1px 0 rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  opacity:0;
  transform: translateY(60px) scale(0.95);
  animation: cardUp 0.8s cubic-bezier(.22,1,.36,1) 2.3s forwards;
  position:relative;
  overflow:hidden;
}

.container::before{
  content:'';
  position:absolute;
  top:-100px;right:-100px;
  width:350px;height:350px;
  background: radial-gradient(circle, rgba(45,108,223,0.12) 0%, transparent 70%);
  pointer-events:none;
}

.container::after{
  content:'';
  position:absolute;
  bottom:-80px;left:-80px;
  width:280px;height:280px;
  background: radial-gradient(circle, rgba(245,200,66,0.07) 0%, transparent 70%);
  pointer-events:none;
}

@keyframes cardUp{
  to{opacity:1; transform:translateY(0) scale(1);}
}

/* ===== SECTION TITLE ===== */
.section-title{
  font-family:'TitelFont',sans-serif;
  color: var(--gold);
  font-size:16px;
  text-align:center;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:25px;
  opacity:0.8;
  text-shadow: 0 0 15px rgba(245,200,66,0.4);
}

/* ===== INPUTS ===== */
.input-group{
  position:relative;
  margin-bottom:18px;
}

.input-group label{
  display:block;
  font-size:11px;
  color:rgba(255,255,255,0.5);
  margin-bottom:6px;
  letter-spacing:1px;
  padding-right:5px;
}

.input-group input{
  width:100%;
  padding:13px 18px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius:12px;
  color:#fff;
  font-family:'WriteFont',sans-serif;
  font-size:15px;
  transition: all 0.3s ease;
  outline:none;
}

.input-group input::placeholder{color:rgba(255,255,255,0.3);}

.input-group input:focus{
  background: rgba(255,255,255,0.1);
  border-color: var(--gold);
  box-shadow:
    0 0 0 3px rgba(245,200,66,0.15),
    inset 0 0 20px rgba(245,200,66,0.05);
  transform: translateY(-1px);
}

.input-icon{
  position:absolute;
  left:15px;
  bottom:14px;
  color:rgba(255,255,255,0.3);
  font-size:16px;
  transition: color 0.3s ease;
  pointer-events:none;
}
.input-group input:focus ~ .input-icon{
  color: var(--gold);
}

/* ===== DIVIDER ===== */
.divider{
  height:1px;
  background: linear-gradient(90deg, transparent, rgba(245,200,66,0.3), transparent);
  margin: 25px 0;
}

/* ===== 3D BUTTONS ===== */
.btn-grid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:14px;
  margin-bottom:14px;
}
.btn-grid-single{
  margin-bottom:14px;
}

.btn-3d{
  position:relative;
  width:100%;
  padding:14px 20px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-size:14px;
  font-family:'WriteFont',sans-serif;
  color:#fff;
  font-weight:bold;
  letter-spacing:0.5px;
  transition: all 0.15s ease;
  transform-style: preserve-3d;
  text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  outline:none;
  overflow:hidden;
}

.btn-3d::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:50%;
  background: rgba(255,255,255,0.1);
  border-radius:14px 14px 0 0;
  pointer-events:none;
}

.btn-3d::after{
  content:'';
  position:absolute;
  inset:0;
  background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.25) 0%, transparent 60%);
  opacity:0;
  transition: opacity 0.3s ease;
  pointer-events:none;
}

.btn-3d:hover::after{opacity:1;}

.btn-3d:hover{
  transform: translateY(-4px) rotateX(8deg) scale(1.02);
  filter: brightness(1.15);
}

.btn-3d:active{
  transform: translateY(2px) rotateX(-3deg) scale(0.98);
  filter: brightness(0.9);
}

/* Button shadow (3D bottom face) */
.btn-wrap{
  perspective:800px;
  transform-style:preserve-3d;
}

.btn-shadow{
  position:absolute;
  bottom:-5px;
  left:5%;
  width:90%;
  height:10px;
  border-radius:50%;
  filter:blur(8px);
  opacity:0.6;
  transition: all 0.15s ease;
  pointer-events:none;
}
.btn-wrap:hover .btn-shadow{
  bottom:-8px;
  opacity:0.8;
  filter:blur(12px);
}
.btn-wrap:active .btn-shadow{
  bottom:-2px;
  opacity:0.3;
}

/* Button Colors */
.btn-save{
  background: linear-gradient(145deg, #1a4a8a, #0d3366);
  box-shadow: 0 6px 0 #072252, 0 8px 20px rgba(13,51,102,0.6), inset 0 1px 0 rgba(255,255,255,0.15);
}
.btn-save .btn-shadow{background:rgba(13,51,102,0.8);}
.btn-save:hover{box-shadow: 0 8px 0 #072252, 0 12px 30px rgba(13,51,102,0.7), inset 0 1px 0 rgba(255,255,255,0.15);}
.btn-save:active{box-shadow: 0 2px 0 #072252, 0 3px 10px rgba(13,51,102,0.5);}

.btn-change{
  background: linear-gradient(145deg, #b38a00, #8a6a00);
  box-shadow: 0 6px 0 #5a4400, 0 8px 20px rgba(138,106,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
}
.btn-change .btn-shadow{background:rgba(138,106,0,0.8);}
.btn-change:hover{box-shadow: 0 8px 0 #5a4400, 0 12px 30px rgba(138,106,0,0.7), inset 0 1px 0 rgba(255,255,255,0.2);}
.btn-change:active{box-shadow: 0 2px 0 #5a4400, 0 3px 10px rgba(138,106,0,0.5);}

.btn-info{
  background: linear-gradient(145deg, #006b38, #004d28);
  box-shadow: 0 6px 0 #003018, 0 8px 20px rgba(0,107,56,0.6), inset 0 1px 0 rgba(255,255,255,0.15);
}
.btn-info .btn-shadow{background:rgba(0,107,56,0.8);}
.btn-info:hover{box-shadow: 0 8px 0 #003018, 0 12px 30px rgba(0,107,56,0.7), inset 0 1px 0 rgba(255,255,255,0.15);}
.btn-info:active{box-shadow: 0 2px 0 #003018, 0 3px 10px rgba(0,107,56,0.5);}

.btn-show{
  background: linear-gradient(145deg, #8b0000, #6b0000);
  box-shadow: 0 6px 0 #400000, 0 8px 20px rgba(139,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.15);
}
.btn-show .btn-shadow{background:rgba(139,0,0,0.8);}
.btn-show:hover{box-shadow: 0 8px 0 #400000, 0 12px 30px rgba(139,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.15);}
.btn-show:active{box-shadow: 0 2px 0 #400000, 0 3px 10px rgba(139,0,0,0.5);}

.btn-delete{
  background: linear-gradient(145deg, #aa0000, #880000);
  box-shadow: 0 6px 0 #500000, 0 8px 20px rgba(170,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.15);
}
.btn-delete .btn-shadow{background:rgba(170,0,0,0.8);}
.btn-delete:hover{box-shadow: 0 8px 0 #500000, 0 12px 30px rgba(170,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.15);}
.btn-delete:active{box-shadow: 0 2px 0 #500000, 0 3px 10px rgba(170,0,0,0.5);}

/* Button icon */
.btn-icon{
  margin-left:8px;
  font-style:normal;
  display:inline-block;
  transition: transform 0.3s ease;
}
.btn-3d:hover .btn-icon{transform: scale(1.3) rotate(-5deg);}

/* ===== RIPPLE EFFECT ===== */
.ripple{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.3);
  transform:scale(0);
  animation:rippleAnim 0.6s linear;
  pointer-events:none;
}
@keyframes rippleAnim{
  to{transform:scale(4);opacity:0;}
}

/* ===== MESSAGE ===== */
#msg{
  margin-top:15px;
  font-weight:bold;
  text-align:center;
  color:#fff;
  font-size:14px;
  min-height:22px;
  opacity:0;
  transform:translateY(5px);
  transition: all 0.3s ease;
}
#msg.show{
  opacity:1;
  transform:translateY(0);
}
#msg.success{color:#4cff91;text-shadow:0 0 10px rgba(76,255,145,0.5);}
#msg.error{color:#ff5c5c;text-shadow:0 0 10px rgba(255,92,92,0.5);}
#msg.info{color:#4fc3f7;text-shadow:0 0 10px rgba(79,195,247,0.5);}

/* ===== INFO BOX ===== */
#infoBox{
  margin-top:18px;
  padding:20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius:14px;
  backdrop-filter:blur(5px);
  color:#fff;
  display:none;
  animation: fadeSlide 0.4s ease;
}

#infoBox h4{
  color: var(--gold);
  font-family:'TitelFont',sans-serif;
  margin-bottom:12px;
  font-size:15px;
  display:flex;
  align-items:center;
  gap:8px;
}

#infoBox p{
  padding:6px 0;
  font-size:14px;
  color:rgba(255,255,255,0.85);
  border-bottom:1px solid rgba(255,255,255,0.06);
  display:flex;
  align-items:center;
  gap:8px;
}
#infoBox p:last-child{border-bottom:none;}
#infoBox p strong{color:rgba(255,255,255,0.5);font-size:12px;min-width:60px;}

/* ===== ALL TITLES ===== */
#allTitles{
  margin-top:18px;
  padding:20px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  max-height:350px;
  overflow-y:auto;
  display:none;
  animation: fadeSlide 0.4s ease;
  scrollbar-width: thin;
  scrollbar-color: rgba(245,200,66,0.3) transparent;
}
#allTitles::-webkit-scrollbar{width:4px;}
#allTitles::-webkit-scrollbar-thumb{background:rgba(245,200,66,0.3);border-radius:10px;}

#allTitles h3{
  color: var(--gold);
  font-family:'TitelFont',sans-serif;
  margin-bottom:14px;
  font-size:15px;
  display:flex;
  align-items:center;
  gap:8px;
}

#allTitles ul{list-style:none;padding:0;margin:0;}
#allTitles li{
  padding:10px 14px;
  border-radius:10px;
  margin-bottom:6px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition: all 0.2s ease;
  color:rgba(255,255,255,0.8);
  font-size:13px;
}
#allTitles li:hover{
  background:rgba(255,255,255,0.08);
  transform:translateX(-3px);
}

#allTitles li span.time{
  color:rgba(255,255,255,0.3);
  font-size:11px;
  flex-shrink:0;
  direction:ltr;
  margin-right:auto;
  padding-left:10px;
}

#allTitles li span.info{
  flex-grow:1;
  text-align:right;
}

.highlight{
  background: rgba(245,200,66,0.12) !important;
  border:1px solid rgba(245,200,66,0.3) !important;
  color:#fff !important;
}
.highlight::before{
  content:'◆ ';
  color: var(--gold);
  font-size:10px;
}

/* Row number badge */
.row-num{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:22px;height:22px;
  border-radius:50%;
  background:rgba(45,108,223,0.4);
  color:#fff;
  font-size:10px;
  margin-left:8px;
  flex-shrink:0;
}
.highlight .row-num{background:rgba(245,200,66,0.4);}

@keyframes fadeSlide{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

/* ===== CUSTOM ALERT MODAL ===== */
#modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  z-index:10000;
  display:none;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(5px);
  animation:fadeIn 0.2s ease;
}
#modal-overlay.active{display:flex;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

.modal-box{
  background: linear-gradient(145deg, rgba(10,22,40,0.98), rgba(20,38,65,0.98));
  border:1px solid rgba(245,200,66,0.3);
  border-radius:20px;
  padding:35px;
  width:380px;
  max-width:90%;
  text-align:center;
  box-shadow:0 25px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
  animation:modalIn 0.3s cubic-bezier(.22,1,.36,1);
  color:#fff;
}
@keyframes modalIn{
  from{opacity:0;transform:scale(0.85) translateY(20px);}
  to{opacity:1;transform:scale(1) translateY(0);}
}

.modal-icon{font-size:48px;margin-bottom:15px;display:block;}
.modal-title{font-family:'TitelFont',sans-serif;font-size:18px;color:var(--gold);margin-bottom:10px;}
.modal-msg{font-size:14px;color:rgba(255,255,255,0.7);margin-bottom:25px;line-height:1.6;}

.modal-input{
  width:100%;
  padding:12px 16px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;
  color:#fff;
  font-family:'WriteFont',sans-serif;
  font-size:14px;
  outline:none;
  margin-bottom:20px;
  transition:all 0.3s;
}
.modal-input:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(245,200,66,0.15);
}

.modal-btns{display:flex;gap:12px;justify-content:center;}
.modal-btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  font-family:'WriteFont',sans-serif;
  font-weight:bold;
  transition:all 0.2s;
}
.modal-btn-confirm{
  background:linear-gradient(145deg,#b38a00,#8a6a00);
  color:#fff;
  box-shadow:0 4px 0 #5a4400;
}
.modal-btn-confirm:hover{transform:translateY(-2px);}
.modal-btn-cancel{
  background:rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.7);
  border:1px solid rgba(255,255,255,0.1);
}
.modal-btn-cancel:hover{background:rgba(255,255,255,0.12);}

/* ===== TOAST NOTIFICATION ===== */
#toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%) translateY(100px);
  background:rgba(10,22,40,0.95);
  border:1px solid rgba(255,255,255,0.15);
  color:#fff;
  padding:14px 28px;
  border-radius:50px;
  font-size:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  z-index:9000;
  transition:transform 0.4s cubic-bezier(.22,1,.36,1);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  gap:10px;
}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.success-toast{border-color:rgba(76,255,145,0.4);}
#toast.error-toast{border-color:rgba(255,92,92,0.4);}

/* ===== ENTRANCE ANIMATIONS ===== */
.btn-wrap{
  opacity:0;
  transform:translateY(20px);
}
.btn-wrap.anim-in{
  animation:btnIn 0.5s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes btnIn{
  to{opacity:1;transform:translateY(0);}
}

.input-group{
  opacity:0;
  transform:translateX(20px);
}
.input-group.anim-in{
  animation:inputIn 0.5s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes inputIn{
  to{opacity:1;transform:translateX(0);}
}

/* ===== FLOATING ELEMENTS ===== */
.float-decoration{
  position:absolute;
  pointer-events:none;
  z-index:0;
}
.float-circle{
  border-radius:50%;
  border:1px solid rgba(245,200,66,0.1);
  animation:floatAnim 6s ease-in-out infinite;
}
@keyframes floatAnim{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
}

/* ===== NEON LINE ===== */
.neon-line{
  height:2px;
  background:linear-gradient(90deg, transparent, rgba(79,195,247,0.5), rgba(245,200,66,0.5), transparent);
  margin:0 -35px 25px;
  animation:neonPulse 3s ease infinite;
}
@keyframes neonPulse{
  0%,100%{opacity:0.5;}
  50%{opacity:1;}
}

/* ===== COUNTER BADGE ===== */
.counter-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:rgba(245,200,66,0.15);

  color:var(--gold);
  border-radius:20px;
  padding:2px 12px;
  font-size:12px;
  margin-right:8px;
}
</style>
</head>
<body>

<!-- VIDEO -->
<video autoplay muted loop id="bgVideo">
  <source src="V.mp4" type="video/mp4">
</video>
<div class="overlay"></div>
<canvas id="particles-canvas"></canvas>

<!-- LOADING SCREEN -->
<div id="loader">
  <div class="loader-logo">
    ⭐ عناوين <span>تقارير الطلبة</span>
  </div>
  <div class="loader-bar-wrap">
    <div class="loader-bar"></div>
  </div>
</div>

<!-- CUSTOM MODAL -->
<div id="modal-overlay">

    <span class="modal-icon" id="modal-icon">✏️</span>
    <div class="modal-title" id="modal-title"></div>

<!-- TOAST -->
<div id="toast"><span id="toast-icon">✅</span><span id="toast-text"></span></div>

<!-- HEADER -->
<div class="header">

  <span class="header-icon" style="margin-right:10px;">✦</span>
</div>

<!-- MAIN -->
<div class="page-wrap">
<div class="container">

  <!-- Floating decorations -->
  <div class="float-decoration float-circle" style="width:80px;height:80px;top:-20px;left:-20px;animation-delay:0s;"></div>
  <div class="float-decoration float-circle" style="width:50px;height:50px;bottom:20px;right:-10px;animation-delay:2s;"></div>

  <div class="neon-line"></div>
  <p class="section-title">✦ أدخل بياناتك ✦</p>

  <!-- INPUTS -->
  <div class="input-group">
    <label>الاسم الثنائي</label>
    <input id="studentName" placeholder="مثال: أحمد محمد">
    <span class="input-icon">👤</span>
  </div>

  <div class="input-group">
    <label>عنوان التقرير</label>
    <input id="reportTitle" placeholder="اكتب عنوان تقريرك هنا">
    <span class="input-icon">📄</span>
  </div>

  <div class="input-group">
    <label>المادة الدراسية</label>
    <input id="subjectName" placeholder="اسم المادة">
    <span class="input-icon">📚</span>
  </div>

  <div class="divider"></div>
  <p class="section-title">✦ الإجراءات ✦</p>

  <!-- BUTTONS ROW 1 -->
  <div class="btn-grid">
    <div class="btn-wrap">
      <button class="btn-3d btn-save" onclick="saveData()">
        <i class="btn-icon">💾</i> حفظ البيانات
      </button>
      <div class="btn-shadow"></div>
    </div>
    <div class="btn-wrap">
      <button class="btn-3d btn-change" onclick="changeTitle()">
        <i class="btn-icon">✏️</i> تغيير العنوان
      </button>
      <div class="btn-shadow"></div>
    </div>
  </div>

  <!-- BUTTONS ROW 2 -->
  <div class="btn-grid">
    <div class="btn-wrap">
      <button class="btn-3d btn-info" onclick="showMyInfo()">
        <i class="btn-icon">👁️</i> معلوماتي
      </button>
      <div class="btn-shadow"></div>
    </div>
    <div class="btn-wrap">
      <button class="btn-3d btn-show" onclick="showAll()">
        <i class="btn-icon">📋</i> عناوين الطلبة
      </button>
      <div class="btn-shadow"></div>
    </div>
  </div>

  <!-- DELETE BUTTON -->
  <div class="btn-grid-single btn-wrap">
    <button class="btn-3d btn-delete" onclick="deleteMyData()">
      <i class="btn-icon">🗑️</i> حذف معلوماتي
    </button>
    <div class="btn-shadow"></div>
  </div>

  <!-- MESSAGE -->
  <div id="msg"></div>

  <!-- INFO BOX -->
  <div id="infoBox"></div>

  <!-- ALL TITLES -->
  <div id="allTitles"></div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const SUPABASE_URL = "https://mcwemgjmqwbgxoyiwant.supabase.co"
const SUPABASE_KEY = "sb_publishable_qmIUC4Rkb-VGOek8qkVqFg_Sn4x3WjI"
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

// ===== PARTICLES =====
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle{
  constructor(){
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height;
    this.size = Math.random()*2+0.5;
    this.speedX = (Math.random()-0.5)*0.5;
    this.speedY = (Math.random()-0.5)*0.5;
    this.opacity = Math.random()*0.5+0.1;
    this.color = Math.random()>0.7 ? '245,200,66' : '79,195,247';
  }
  update(){
    this.x+=this.speedX;
    this.y+=this.speedY;
    if(this.x<0||this.x>canvas.width) this.speedX*=-1;
    if(this.y<0||this.y>canvas.height) this.speedY*=-1;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle=`rgba(${this.color},${this.opacity})`;
    ctx.fill();
  }
}

for(let i=0;i<80;i++) particles.push(new Particle());

function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{p.update();p.draw();});
  // Draw connections
  particles.forEach((a,i)=>{
    particles.slice(i+1).forEach(b=>{
      const dx=a.x-b.x, dy=a.y-b.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120){
        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.lineTo(b.x,b.y);
        ctx.strokeStyle=`rgba(245,200,66,${0.08*(1-dist/120)})`;
        ctx.lineWidth=0.5;
        ctx.stroke();
      }
    });
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ===== LOADER =====
window.addEventListener('load',()=>{
  setTimeout(()=>{
    const loader = document.getElementById('loader');
    loader.style.opacity='0';
    loader.style.transform='scale(1.1)';
    setTimeout(()=>{ loader.style.display='none'; triggerEntranceAnims(); },800);
  },2000);
});

function triggerEntranceAnims(){
  const inputs = document.querySelectorAll('.input-group');
  inputs.forEach((el,i)=>{
    setTimeout(()=>el.classList.add('anim-in'), i*100);
  });
  const btns = document.querySelectorAll('.btn-wrap');
  btns.forEach((el,i)=>{
    setTimeout(()=>el.classList.add('anim-in'), 300+i*80);
  });
}

// ===== RIPPLE =====
document.querySelectorAll('.btn-3d').forEach(btn=>{
  btn.addEventListener('click',function(e){
    const ripple=document.createElement('span');
    ripple.classList.add('ripple');
    const rect=this.getBoundingClientRect();
    ripple.style.width=ripple.style.height='100px';
    ripple.style.left=(e.clientX-rect.left-50)+'px';
    ripple.style.top=(e.clientY-rect.top-50)+'px';
    this.appendChild(ripple);
    setTimeout(()=>ripple.remove(),700);
  });
});

// ===== TOAST =====
function showToast(msg, type='success'){
  const t=document.getElementById('toast');
  const icon=document.getElementById('toast-icon');
  const text=document.getElementById('toast-text');
  icon.textContent = type==='success' ? '✅' : type==='error' ? '❌' : 'ℹ️';
  text.textContent = msg;
  t.className='show '+(type==='success'?'success-toast':'error-toast');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.className='',3000);
}

// ===== MESSAGE =====
function setMsg(text, type='info'){
  const m=document.getElementById('msg');
  m.textContent=text;
  m.className='show '+type;
  clearTimeout(m._t);
  m._t=setTimeout(()=>m.className='',4000);
}

// ===== MODAL =====
function showModal({icon='✏️',title='',msg='',inputPlaceholder='',withInput=false,confirmText='تأكيد',cancelText='إلغاء'}){
  return new Promise(resolve=>{
    document.getElementById('modal-icon').textContent=icon;
    document.getElementById('modal-title').textContent=title;
    document.getElementById('modal-msg').textContent=msg;
    const inp=document.getElementById('modal-input');
    if(withInput){
      inp.style.display='block';
      inp.placeholder=inputPlaceholder||'';
      inp.value='';
    } else { inp.style.display='none'; }
    const btns=document.getElementById('modal-btns');
    btns.innerHTML=`
      <button class="modal-btn modal-btn-cancel">${cancelText}</button>
      <button class="modal-btn modal-btn-confirm">${confirmText}</button>
    `;
    const overlay=document.getElementById('modal-overlay');
    overlay.classList.add('active');
    btns.querySelector('.modal-btn-confirm').onclick=()=>{
      overlay.classList.remove('active');
      resolve(withInput ? inp.value : true);
    };
    btns.querySelector('.modal-btn-cancel').onclick=()=>{
      overlay.classList.remove('active');
      resolve(null);
    };
  });
}

// ===== SITE STATUS =====
async function checkSiteStatus(){
  const {data,error}=await supabase.from("site_control").select("site_open").eq("id",1).single();
  if(error){ document.body.innerHTML="<h2 style='color:#fff;text-align:center;margin-top:100px;'>حدث خطأ عند التحقق من حالة الموقع</h2>"; return false; }
  if(!data.site_open){ document.body.innerHTML="<h2 style='color:#fff;text-align:center;margin-top:100px;font-size:36px;'>الموقع مغلق ❌</h2>"; return false; }
  return true;
}

checkSiteStatus().then(open=>{
  if(open){
    window.saveData=saveData;
    window.changeTitle=changeTitle;
    window.showAll=showAll;
    window.showMyInfo=showMyInfo;
    window.deleteMyData=deleteMyData;
  }
});

// ===== HELPERS =====
function formatDate(ts){
  if(!ts) return "";
  const d=new Date(ts);
  const h=String(d.getHours()).padStart(2,'0');
  const m=String(d.getMinutes()).padStart(2,'0');
  const s=String(d.getSeconds()).padStart(2,'0');
  return `${h}:${m}:${s} (${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()})`;
}

function generateCode(){
  return Math.floor(1000+Math.random()*9000).toString();
}

// ===== SAVE =====
async function saveData(){
  const name=document.getElementById("studentName").value.trim();
  const title=document.getElementById("reportTitle").value.trim();
  const subject=document.getElementById("subjectName").value.trim();
  if(name.trim().split(/\s+/).length<2){ setMsg("⚠️ الاسم يجب أن يكون ثنائياً على الأقل","error"); showToast("الاسم يجب أن يكون ثنائياً","error"); return; }
  if(!name||!title||!subject){ setMsg("⚠️ يرجى ملء جميع الحقول","error"); showToast("يرجى ملء جميع الحقول","error"); return; }
  const {data:check}=await supabase.from("student_reports").select("*").or(`name.eq.${name},title.eq.${title}`);
  if(check&&check.length>0){ setMsg("❌ الاسم أو العنوان مستخدم مسبقاً","error"); showToast("الاسم أو العنوان مستخدم مسبقاً","error"); return; }
  let code=localStorage.getItem("studentCode");
  if(!code){
    let unique=false;
    while(!unique){
      code=generateCode();
      const {data:codeCheck}=await supabase.from("student_reports").select("*").eq("code",code);
      if(!codeCheck||codeCheck.length===0) unique=true;
    }
    localStorage.setItem("studentCode",code);
  }
  const now=new Date().toISOString();
  const {error}=await supabase.from("student_reports").insert([{name,title,subject,date:now,code}]);
  if(error){ setMsg("❌ فشل الحفظ","error"); showToast("فشل الحفظ","error"); console.log(error); return; }
  setMsg("✅ تم حفظ البيانات بنجاح","success");
  showToast("تم حفظ البيانات بنجاح 🎉","success");
  await showMyInfo();
  await showAll();
}

// ===== CHANGE TITLE =====
async function changeTitle(){
  const code=localStorage.getItem("studentCode");
  if(!code){ setMsg("⚠️ لم يتم إدخال بياناتك بعد","error"); showToast("لا توجد بيانات محفوظة","error"); return; }
  const newTitle=await showModal({
    icon:'✏️',
    title:'تغيير عنوان التقرير',
    msg:'أدخل العنوان الجديد لتقريرك',
    withInput:true,
    inputPlaceholder:'العنوان الجديد...',
    confirmText:'تغيير',
    cancelText:'إلغاء'
  });
  if(!newTitle) return;
  const now=new Date().toISOString();
  const {error}=await supabase.from("student_reports").update({title:newTitle,date:now}).eq("code",code);
  if(error){ setMsg("❌ فشل التحديث","error"); showToast("فشل التحديث","error"); console.log(error); return; }
  setMsg("✅ تم تغيير العنوان بنجاح","success");
  showToast("تم تغيير العنوان ✏️","success");
  await showMyInfo();
  await showAll();
}

// ===== SHOW MY INFO =====
async function showMyInfo(){
  const code=localStorage.getItem("studentCode");
  const infoBox=document.getElementById("infoBox");
  if(!code){ setMsg("⚠️ لم يتم إدخال بياناتك بعد","error"); showToast("لا توجد بيانات محفوظة","error"); return; }
  const {data,error}=await supabase.from("student_reports").select("*").eq("code",code).single();
  if(error||!data){ setMsg("⚠️ لا توجد بيانات","error"); return; }
  infoBox.style.display='block';
  infoBox.innerHTML=`
    <h4>🎓 معلومات الطالب</h4>
    <p><strong>👤 الاسم</strong> ${data.name}</p>
    <p><strong>📄 العنوان</strong> ${data.title}</p>
    <p><strong>📚 المادة</strong> ${data.subject}</p>
    <p><strong>🕐 التاريخ</strong> ${formatDate(data.date)}</p>
  `;
}

// ===== SHOW ALL =====
async function showAll(){
  const {data,error}=await supabase.from("student_reports").select("*").order("id",{ascending:true});
  const container=document.getElementById("allTitles");
  const code=localStorage.getItem("studentCode");
  if(error){ container.innerHTML="❌ فشل تحميل البيانات"; return; }
  container.style.display='block';
  let html=`<h3>📋 جميع العناوين <span class="counter-badge">${data.length} طالب</span></h3><ul>`;
  data.forEach((d,i)=>{
    const highlight=d.code===code?"highlight":"";
    html+=`<li class="${highlight}">
      <span class="row-num">${i+1}</span>
      <span class="info">${d.name} — ${d.title} — <em>${d.subject}</em></span>
      <span class="time">${formatDate(d.date)}</span>
    </li>`;
  });
  html+="</ul>";
  container.innerHTML=html;
}

// ===== DELETE =====
async function deleteMyData(){
  const code=localStorage.getItem("studentCode");
  if(!code){ setMsg("⚠️ لم يتم إدخال بياناتك بعد","error"); showToast("لا توجد بيانات لحذفها","error"); return; }
  const confirmed=await showModal({
    icon:'🗑️',
    title:'تأكيد الحذف',
    msg:'هل أنت متأكد من حذف جميع بياناتك؟ لا يمكن التراجع عن هذا الإجراء.',
    withInput:false,
    confirmText:'حذف',
    cancelText:'إلغاء'
  });
  if(!confirmed) return;
  const {error}=await supabase.from("student_reports").delete().eq("code",code);
  if(error){ setMsg("❌ فشل الحذف","error"); showToast("فشل الحذف","error"); console.log(error); return; }
  setMsg("✅ تم حذف بياناتك","success");
  showToast("تم حذف البيانات 🗑️","success");
  document.getElementById("infoBox").style.display='none';
  document.getElementById("infoBox").innerHTML='';
  localStorage.removeItem("studentCode");
  await showAll();
}

window.saveData=saveData;
window.changeTitle=changeTitle;
window.showAll=showAll;
window.showMyInfo=showMyInfo;
window.deleteMyData=deleteMyData;
</script>
</body>
