<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>عناوين تقارير الطلبة</title>
<style>
@font-face { font-family: 'TitelFont'; src: url('TITEL.ttf'); }
@font-face { font-family: 'WriteFont'; src: url('WRITE.otf'); }

body {
    margin:0;
    font-family:'WriteFont',sans-serif;
    background: url('H.jpg') no-repeat center center fixed;
    background-size: cover;
}

.header{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    padding:20px;
    background:rgba(30,58,95,0.9);
    color:white;
    font-family: 'TitelFont', sans-serif;
}

.top-right{
    position:absolute;
    top:20px;
    left:20px;
    font-size:14px;
    font-family:'WriteFont',sans-serif;
    color:white;
}

.container{
    width:500px;
    margin:120px auto;
    background:rgba(255,255,255,0.95);
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    font-family:'WriteFont',sans-serif;
}

.rank{
    text-align:center;
    margin-bottom:20px;
    font-weight:bold;
    font-family:'WriteFont',sans-serif;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
    font-family:'WriteFont',sans-serif;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-bottom:10px;
    cursor:pointer;
    font-family:'WriteFont',sans-serif;
}

.save-btn{background:#1e3a5f;color:white;}
.change-btn{background:#b38b00;color:white;}
.info-btn{background:#006b38;color:white;}
.show-btn{background:#8b0000;color:white;}
.delete-btn{background:#aa0000;color:white;}
#msg{margin-top:10px; text-align:center; font-weight:bold;}
#allTitles{margin-top:15px;}
</style>
</head>
<body>

<div class="header">عناوين تقارير الطلبة</div>

<div class="top-right">
قسم إدارة الأعمال<br>
طلبة المرحلة الثانية<br>
الدراسة مسائي<br>
قاعة (ب)
</div>

<div class="container">

<div class="rank">رتبتك هنا</div>

<input id="studentName" placeholder="اسم الطالب">
<input id="reportTitle" placeholder="عنوان التقرير">
<input id="subjectName" placeholder="المادة الدراسية">

<button class="save-btn" onclick="saveData()">حفظ</button>
<button class="change-btn" onclick="changeTitle()">تغيير اسم العنوان</button>
<button class="info-btn" onclick="showMyInfo()">معلوماتي</button>
<button class="show-btn" onclick="showAll()">إظهار العناوين</button>
<button class="delete-btn" onclick="deleteMyData()">حذف بياناتي</button>

<div id="msg"></div>
<div id="allTitles"></div>

<script type="module">
// Supabase client
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = 'https://mcwemgjmqwbgxoyiwant.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qmIUC4Rkb-VGOek8qkVqFg_Sn4x3WjI'; 
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const EDGE_FUNCTION_URL = 'https://mcwemgjmqwbgxoyiwant.supabase.co/functions/v1/swift-api';

let changedTitles = [];

// حفظ البيانات
async function saveData(){
    const name = document.getElementById("studentName").value.trim();
    const title = document.getElementById("reportTitle").value.trim();
    const subject = document.getElementById("subjectName").value.trim();
    const msg = document.getElementById("msg");

    // التحقق من الاسم الثلاثي
    if(name.split(" ").length < 3){
        msg.innerHTML = "<span style='color:red'>الاسم يجب أن يكون ثلاثياً على الأقل</span>";
        return;
    }

    if(!name || !title || !subject){
        msg.innerHTML = "<span style='color:red'>املأ جميع الحقول</span>";
        return;
    }

    // تحقق من عدم تكرار الاسم أو العنوان
    const { data: existing } = await supabase
        .from('student_reports')
        .select('*')
        .or(`name.eq.${name},title.eq.${title}`);

    if(existing.length > 0){
        msg.innerHTML = "<span style='color:red'>اسم الطالب أو عنوان التقرير موجود مسبقاً</span>";
        return;
    }

    const date = new Date().toLocaleString();
    const dataObj = { name, title, subject, date, changedTitles };

    // حفظ في Supabase
    const { error } = await supabase.from('student_reports').insert([dataObj]);
    if(error){ msg.innerHTML = "<span style='color:red'>فشل الحفظ في قاعدة البيانات</span>"; console.log(error); return; }

    // حفظ جلسة محلية
    sessionStorage.setItem("student_" + name, JSON.stringify(dataObj));

    // إرسال للبوت عبر Edge Function
    try{
        const resp = await fetch(EDGE_FUNCTION_URL, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(dataObj)
        });
        const result = await resp.json();
        if(result.ok){
            msg.innerHTML = "<span style='color:green'>تم الحفظ وإرسال البيانات للبوت بنجاح</span>";
        } else {
            msg.innerHTML = "<span style='color:red'>تم الحفظ لكن فشل الإرسال للبوت</span>";
        }
    }catch(e){
        msg.innerHTML = "<span style='color:red'>تم الحفظ لكن فشل الإرسال للبوت</span>";
        console.log(e);
    }
}

// تغيير العنوان
function changeTitle(){
    const newTitle = prompt("ادخل العنوان الجديد");
    if(!newTitle) return;

    for(let key in sessionStorage){
        if(key.startsWith("student_")){
            let s = JSON.parse(sessionStorage[key]);
            if(s.title === newTitle){
                alert("هذا العنوان مستخدم مسبقاً");
                return;
            }
        }
    }

    changedTitles.push(newTitle);
    document.getElementById("reportTitle").value = newTitle;
}

// عرض معلومات المستخدم
function showMyInfo(){
    const name = document.getElementById("studentName").value.trim();
    if(!name){ alert("ادخل اسمك أولاً"); return; }

    const dataStr = sessionStorage.getItem("student_" + name);
    if(!dataStr){ alert("لم يتم حفظ بياناتك بعد"); return; }

    const data = JSON.parse(dataStr);
    alert(
        `اسم الطالب: ${data.name}\nعنوان التقرير: ${data.title}\nالمادة: ${data.subject}\nالتاريخ: ${data.date}\nالعناوين التي غيرها: ${data.changedTitles.join(", ") || "لا يوجد"}`
    );
}

// عرض جميع العناوين
async function showAll(){
    const { data, error } = await supabase.from('student_reports').select('*');
    const container = document.getElementById("allTitles");
    if(error){ container.innerHTML = "<span style='color:red'>فشل جلب البيانات</span>"; return; }

    let html = "<h3>جميع التقارير:</h3><ul>";
    data.forEach((d,i) => {
        html += `<li>${i+1}. ${d.name} - ${d.title} - ${d.subject} - ${d.date}</li>`;
    });
    html += "</ul>";
    container.innerHTML = html;
}

// حذف بيانات المستخدم
async function deleteMyData(){
    const name = document.getElementById("studentName").value.trim();
    if(!name){ alert("ادخل اسمك أولاً"); return; }

    const { error } = await supabase.from('student_reports').delete().eq('name', name);
    if(error){ alert("فشل الحذف"); console.log(error); return; }

    sessionStorage.removeItem("student_" + name);
    document.getElementById("msg").innerHTML = "<span style='color:green'>تم حذف بياناتك بنجاح</span>";
    document.getElementById("allTitles").innerHTML = "";
}
</script>

<script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"></script>
</body>
</html>
