<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>عناوين تقارير الطلبة</title>
<style>
@font-face { font-family: 'TitelFont'; src: url('TITEL.ttf'); }
@font-face { font-family: 'WriteFont'; src: url('WRITE.otf'); }

body {
    margin:0;
    font-family:'WriteFont',sans-serif;
    background: url('H.jpg') no-repeat center center fixed;
    background-size: cover;
}

.header{
    text-align:center;
    font-size:36px;
    font-weight:bold;
    padding:25px;
    background: rgba(30,58,95,0.85);
    color:white;
    font-family: 'TitelFont', sans-serif;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
}

.top-right{
    position:absolute;
    top:20px;
    left:20px;
    font-size:14px;
    font-family:'WriteFont',sans-serif;
    background: rgba(255,255,255,0.7);
    padding:10px;
    border-radius:10px;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.3);
}

.container{
    width:520px;
    margin:120px auto;
    background:rgba(255,255,255,0.95);
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
    font-family:'WriteFont',sans-serif;
}

.rank{
    text-align:center;
    margin-bottom:25px;
    font-weight:bold;
    font-size:18px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:18px;
    border-radius:10px;
    border:1px solid #ccc;
    font-family:'WriteFont',sans-serif;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    margin-bottom:12px;
    cursor:pointer;
    font-family:'WriteFont',sans-serif;
    font-size:16px;
    transition: all 0.2s ease;
}

button:hover{
    opacity:0.9;
}

.save-btn{background:#1e3a5f;color:white;}
.change-btn{background:#b38b00;color:white;}
.info-btn{background:#006b38;color:white;}
.show-titles-btn{background:#5a2e8a;color:white;}
</style>
</head>
<body>

<div class="header">عناوين تقارير الطلبة</div>

<div class="top-right">
قسم إدارة الأعمال<br>
طلبة المرحلة الثانية<br>
الدراسة مسائي<br>
قاعة (ب)
</div>

<div class="container">

<div class="rank">رتبتك هنا</div>

<input id="studentName" placeholder="اسم الطالب">
<input id="reportTitle" placeholder="عنوان التقرير">
<input id="subjectName" placeholder="المادة الدراسية">

<button class="save-btn" onclick="saveData()">حفظ</button>
<button class="change-btn" onclick="changeTitle()">تغيير اسم العنوان</button>
<button class="info-btn" onclick="showMyInfo()">معلوماتي</button>
<button class="show-titles-btn" onclick="showAllTitles()">إظهار العناوين</button>

<div id="msg"></div>

</div>

<script>
let changedTitles = [];

// رابط Edge Function على Supabase أو أي سيرفر
const EDGE_FUNCTION_URL = "https://student-reports-grup-xvoc6v3rh-habgit286s-projects.vercel.app"; // ضع الرابط الصحيح هنا

// حفظ البيانات لكل مستخدم، إرسالها للتليجرام عبر Edge Function
async function saveData(){
    const name = document.getElementById("studentName").value.trim();
    const title = document.getElementById("reportTitle").value.trim();
    const subject = document.getElementById("subjectName").value.trim();
    const msg = document.getElementById("msg");

    if(!name || !title || !subject){
        msg.innerHTML = "<span style='color:red'>املأ جميع الحقول</span>";
        return;
    }

    // منع تكرار اسم الطالب أو العنوان
    for(let key in sessionStorage){
        if(key.startsWith("student_")){
            const s = JSON.parse(sessionStorage[key]);
            if(s.name === name){
                msg.innerHTML = "<span style='color:red'>اسم الطالب موجود مسبقاً</span>";
                return;
            }
            if(s.title === title){
                msg.innerHTML = "<span style='color:red'>عنوان التقرير مستخدم مسبقاً</span>";
                return;
            }
        }
    }

    const date = new Date().toLocaleString();
    const data = { name, title, subject, date, changedTitles };

    // حفظ بيانات المستخدم في الجلسة
    sessionStorage.setItem("student_" + name, JSON.stringify(data));

    // إرسال البيانات عبر Edge Function للتليجرام و Supabase
    try{
        const response = await fetch(`${EDGE_FUNCTION_URL}/api/send`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(data)
        });
        const result = await response.json();
        if(result.ok){
            msg.innerHTML = "<span style='color:green'>تم الحفظ وإرسال البيانات بنجاح</span>";
        } else {
            msg.innerHTML = "<span style='color:red'>فشل الإرسال</span>";
            console.error(result);
        }
    } catch(e){
        msg.innerHTML = "<span style='color:red'>فشل الإرسال</span>";
        console.error(e);
    }
}

// تغيير العنوان
function changeTitle(){
    const newTitle = prompt("ادخل العنوان الجديد");
    if(!newTitle) return;

    for(let key in sessionStorage){
        if(key.startsWith("student_")){
            const s = JSON.parse(sessionStorage[key]);
            if(s.title === newTitle){
                alert("هذا العنوان مستخدم مسبقاً");
                return;
            }
        }
    }

    changedTitles.push(newTitle);
    document.getElementById("reportTitle").value = newTitle;
}

// عرض معلومات المستخدم الحالي
function showMyInfo(){
    const name = document.getElementById("studentName").value.trim();
    if(!name){
        alert("ادخل اسمك أولاً");
        return;
    }

    const dataStr = sessionStorage.getItem("student_" + name);
    if(!dataStr){
        alert("لم يتم حفظ بياناتك بعد");
        return;
    }

    const data = JSON.parse(dataStr);
    alert(
        `اسم الطالب: ${data.name}\nعنوان التقرير: ${data.title}\nالمادة: ${data.subject}\nالتاريخ: ${data.date}\nالعناوين التي غيرها: ${data.changedTitles.join(", ") || "لا يوجد"}`
    );
}

// إظهار جميع العناوين
function showAllTitles(){
    let allData = [];
    for(let key in sessionStorage){
        if(key.startsWith("student_")){
            const s = JSON.parse(sessionStorage[key]);
            allData.push(`الطالب: ${s.name} | التقرير: ${s.title} | المادة: ${s.subject} | التاريخ: ${s.date}`);
        }
    }

    if(allData.length === 0){
        alert("لا توجد بيانات محفوظة بعد");
        return;
    }

    alert(allData.join("\n"));
}
</script>

</body>
</html>
