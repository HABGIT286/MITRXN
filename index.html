<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>عناوين تقارير الطلبة</title>
<style>
@font-face { font-family: 'TitelFont'; src: url('TITEL.ttf'); }
@font-face { font-family: 'WriteFont'; src: url('WRITE.otf'); }

body {
    margin:0;
    font-family:'WriteFont',sans-serif;
    background: url('H.jpg') no-repeat center center fixed;
    background-size: cover;
}

.header{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    padding:20px;
    background:#1e3a5f;
    color:white;
    font-family: 'TitelFont', sans-serif;
}

.top-right{
    position:absolute;
    top:20px;
    left:20px;
    font-size:14px;
    font-family:'WriteFont',sans-serif;
}

.container{
    width:500px;
    margin:100px auto;
    background:rgba(255,255,255,0.9);
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    font-family:'WriteFont',sans-serif;
}

.rank{
    text-align:center;
    margin-bottom:20px;
    font-weight:bold;
    font-family:'WriteFont',sans-serif;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
    font-family:'WriteFont',sans-serif;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-bottom:10px;
    cursor:pointer;
    font-family:'WriteFont',sans-serif;
}

.save-btn{background:#1e3a5f;color:white;}
.change-btn{background:#b38b00;color:white;}
.info-btn{background:#006b38;color:white;}
.show-titles-btn{background:#5a2e8a;color:white;}
</style>
</head>
<body>

<div class="header">عناوين تقارير الطلبة</div>

<div class="top-right">
قسم إدارة الأعمال<br>
طلبة المرحلة الثانية<br>
الدراسة مسائي<br>
قاعة (ب)
</div>

<div class="container">

<div class="rank">رتبتك هنا</div>

<input id="studentName" placeholder="اسم الطالب">
<input id="reportTitle" placeholder="عنوان التقرير">
<input id="subjectName" placeholder="المادة الدراسية">

<button class="save-btn" onclick="saveData()">حفظ</button>
<button class="change-btn" onclick="changeTitle()">تغيير اسم العنوان</button>
<button class="info-btn" onclick="showMyInfo()">معلوماتي</button>
<button class="show-titles-btn" onclick="showAllTitles()">إظهار العناوين</button>

<div id="msg"></div>

</div>

<script>
let changedTitles = [];

// حفظ البيانات محليًا وإرسال للبوت عبر السيرفر
async function saveData(){
    const name = document.getElementById("studentName").value.trim();
    const title = document.getElementById("reportTitle").value.trim();
    const subject = document.getElementById("subjectName").value.trim();
    const msg = document.getElementById("msg");

    if(!name || !title || !subject){
        msg.innerHTML = "<span style='color:red'>املأ جميع الحقول</span>";
        return;
    }

    const date = new Date().toLocaleString();

    const data = { name, title, subject, date, changedTitles };

    // حفظ بيانات المستخدم في الجلسة
    sessionStorage.setItem("student_" + name, JSON.stringify(data));

    // إرسال البيانات للبوت عبر السيرفر
    try{
        const res = await fetch("https://student-reports-grup-xvoc6v3rh-habgit286s-projects.vercel.app/api/send", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(data)
        });

        const result = await res.json();
        if(result.ok){
            msg.innerHTML = "<span style='color:green'>تم الحفظ وإرسال البيانات للبوت بنجاح</span>";
        } else {
            msg.innerHTML = "<span style='color:red'>فشل الإرسال للبوت</span>";
            console.error(result.error);
        }
    }catch(e){
        msg.innerHTML = "<span style='color:red'>فشل الإرسال للبوت</span>";
        console.log(e);
    }
}

// تغيير العنوان مع منع التكرار
function changeTitle(){
    const newTitle = prompt("ادخل العنوان الجديد");
    if(!newTitle) return;

    for(let key in sessionStorage){
        if(key.startsWith("student_")){
            let s = JSON.parse(sessionStorage[key]);
            if(s.title === newTitle){
                alert("هذا العنوان مستخدم مسبقاً");
                return;
            }
        }
    }

    changedTitles.push(newTitle);
    document.getElementById("reportTitle").value = newTitle;
}

// عرض معلومات المستخدم الحالية
function showMyInfo(){
    const name = document.getElementById("studentName").value.trim();
    if(!name){
        alert("ادخل اسمك أولاً");
        return;
    }

    const dataStr = sessionStorage.getItem("student_" + name);
    if(!dataStr){
        alert("لم يتم حفظ بياناتك بعد");
        return;
    }

    const data = JSON.parse(dataStr);

    alert(
        "اسم الطالب: " + data.name +
        "\nعنوان التقرير: " + data.title +
        "\nالمادة: " + data.subject +
        "\nالتاريخ: " + data.date +
        "\nالعناوين التي غيرها: " + (data.changedTitles.join(", ") || "لا يوجد")
    );
}

// عرض كل أسماء الطلاب وعناوين تقاريرهم في الجلسة
function showAllTitles(){
    let allData = [];
    for(let key in sessionStorage){
        if(key.startsWith("student_")){
            const s = JSON.parse(sessionStorage[key]);
            allData.push(`الطالب: ${s.name} | التقرير: ${s.title}`);
        }
    }

    if(allData.length === 0){
        alert("لا توجد بيانات محفوظة بعد");
        return;
    }

    alert(allData.join("\n"));
}
</script>

</body>
</html>
