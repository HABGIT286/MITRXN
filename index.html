<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة تقارير الطلبة VIP مطورة</title>
<style>
@font-face { font-family: 'TitelFont'; src: url('TITEL.ttf'); }
@font-face { font-family: 'WriteFont'; src: url('WRITE.otf'); }

body {
    margin: 0;
    font-family: 'WriteFont', sans-serif;
    background: #0a0025;
    overflow-x: hidden;
}

/* فيديو الخلفية الطبيعي */
#bgVideo {
    position: fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    object-fit: cover;
    z-index:-2;
}

/* Overlay بسيط */
#overlay {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.3);
    z-index:-1;
}

/* Header */
.header {
    text-align: center;
    font-size: 42px;
    font-family: 'TitelFont', sans-serif;
    font-weight: bold;
    padding: 30px 15px;
    background: linear-gradient(135deg, #4b0082, #800080);
    color: gold;
    text-shadow: 0 0 20px rgba(255,215,0,0.8);
    border-bottom: 4px solid gold;
    letter-spacing: 2px;
    animation: headerGlow 2s infinite alternate;
}

@keyframes headerGlow {
    0% {text-shadow: 0 0 20px rgba(255,215,0,0.8);}
    50% {text-shadow: 0 0 30px rgba(255,255,0,1);}
    100% {text-shadow: 0 0 20px rgba(255,215,0,0.8);}
}

/* الحاوية الرئيسية */
.container {
    width: 750px;
    max-width: 95%;
    margin: 60px auto;
    padding: 45px;
    border-radius: 25px;
    background: rgba(0,0,0,0.35);
    box-shadow: 0 15px 40px rgba(255,215,0,0.25);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,215,0,0.3);
    transition: all 0.5s ease;
    animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn {
    0% {opacity:0; transform: translateY(-20px);}
    100% {opacity:1; transform: translateY(0);}
}

/* الحقول */
input {
    width: 100%;
    padding: 16px 20px;
    margin-bottom: 20px;
    border-radius: 15px;
    border: 1px solid rgba(255,215,0,0.4);
    background: rgba(0,0,0,0.25);
    color: #fff;
    font-size: 18px;
    font-family: 'WriteFont', sans-serif;
    box-shadow: inset 0 4px 15px rgba(255,215,0,0.1);
    transition: all 0.3s ease;
}

input:focus {
    outline: none;
    border: 2px solid gold;
    box-shadow: 0 0 20px gold inset;
    background: rgba(0,0,0,0.35);
}

/* أزرار VIP */
button {
    width: 100%;
    padding: 18px;
    margin-bottom: 18px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
    color: #fff;
    text-transform: uppercase;
    background: linear-gradient(145deg, #4b0082, #800080);
    box-shadow: 0 10px 40px rgba(255,215,0,0.4);
    transition: all 0.4s ease;
}

button:hover {
    transform: translateY(-5px) scale(1.07);
    box-shadow: 0 15px 50px rgba(255,215,0,0.7), 0 0 20px rgba(255,255,0,0.3) inset;
    background: linear-gradient(145deg, #800080, #4b0082);
}

button:active {
    transform: translateY(2px) scale(0.95);
    box-shadow: 0 6px 25px rgba(255,215,0,0.5);
}

/* ألوان خاصة */
.save { background: linear-gradient(145deg, #4b0082, #6a0dad); }
.change { background: linear-gradient(145deg, #b38b00, #ffd700); color:#111;}
.info { background: linear-gradient(145deg, #006b38, #00ff7f);}
.show { background: linear-gradient(145deg, #8b0000, #ff0000);}
.delete { background: linear-gradient(145deg, #aa0000, #ff4d4d);}

/* رسائل الحالة */
#msg {
    margin-top: 20px;
    text-align: center;
    font-weight: bold;
    font-size: 18px;
    color: gold;
    text-shadow: 1px 1px 12px rgba(0,0,0,0.7);
}

/* صناديق المعلومات والقوائم */
#infoBox, #allTitles {
    margin-top: 30px;
    padding: 25px;
    background: rgba(0,0,0,0.4);
    border-radius: 25px;
    max-height: 400px;
    overflow-y: auto;
    color: #fff;
    font-family: 'WriteFont', sans-serif;
    backdrop-filter: blur(8px);
    box-shadow: 0 12px 40px rgba(255,215,0,0.25);
    border: 1px solid rgba(255,215,0,0.3);
}

/* قوائم الطلبة */
#allTitles ul { list-style: none; padding: 0; margin: 0; }

#allTitles li {
    padding: 14px 18px;
    margin-bottom: 12px;
    border-radius: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.05);
    transition: all 0.3s ease;
    box-shadow: 0 0 12px rgba(255,215,0,0.1);
}

#allTitles li:hover {
    transform: scale(1.03);
    background: rgba(255,215,0,0.1);
    box-shadow: 0 0 25px gold;
}

#allTitles li span.time {
    font-size: 13px;
    flex-shrink: 0;
    color: #ccc;
    direction: ltr;
}

#allTitles li span.info {
    margin-right: 10px;
    flex-grow: 1;
    color: #fff;
}

.highlight {
    background: rgba(255,215,0,0.3);
    border-left: 6px solid gold;
    padding-left: 10px;
    border-radius: 8px;
    font-weight: bold;
    text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
}

/* Scrollbar VIP */
#infoBox::-webkit-scrollbar, #allTitles::-webkit-scrollbar {
    width: 12px;
}

#infoBox::-webkit-scrollbar-track, #allTitles::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
}

#infoBox::-webkit-scrollbar-thumb, #allTitles::-webkit-scrollbar-thumb {
    background: gold;
    border-radius: 12px;
    box-shadow: 0 0 6px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<video autoplay muted loop id="bgVideo">
    <source src="V.mp4" type="video/mp4">
    متصفحك لا يدعم عرض الفيديو.
</video>
<div id="overlay"></div>

<div class="header">لوحة تقارير الطلبة VIP</div>

<div class="container">
<input id="studentName" placeholder="اسمك الثنائي">
<input id="reportTitle" placeholder="عنوان التقرير">
<input id="subjectName" placeholder="المادة الدراسية">

<button class="save" onclick="saveData()">حفظ</button>
<button class="change" onclick="changeTitle()">تغيير عنوان التقرير</button>
<button class="info" onclick="showMyInfo()">معلوماتي</button>
<button class="show" onclick="showAll()">عناوين الطلبة</button>
<button class="delete" onclick="deleteMyData()">حذف معلوماتي</button>

<div id="msg"></div>
<div id="infoBox"></div>
<div id="allTitles"></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const SUPABASE_URL = "https://mcwemgjmqwbgxoyiwant.supabase.co"
const SUPABASE_KEY = "sb_publishable_qmIUC4Rkb-VGOek8qkVqFg_Sn4x3WjI"
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

function formatDate(ts){
    if(!ts) return ""
    const d = new Date(ts)
    const h = String(d.getHours()).padStart(2,'0')
    const m = String(d.getMinutes()).padStart(2,'0')
    const s = String(d.getSeconds()).padStart(2,'0')
    return `${h}:${m}:${s} (${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()})`
}

function generateCode(){
    return Math.floor(1000 + Math.random()*9000).toString()
}

async function saveData(){
    const name = document.getElementById("studentName").value.trim()
    const title = document.getElementById("reportTitle").value.trim()
    const subject = document.getElementById("subjectName").value.trim()
    const msg = document.getElementById("msg")
    if(name.trim().split(/\s+/).length < 2){ msg.innerHTML = "الاسم يجب أن يكون ثنائي على الأقل"; return; }
    if(!name||!title||!subject){ msg.innerHTML="املأ جميع الحقول"; return }
    const {data:check} = await supabase.from("student_reports").select("*").or(`name.eq.${name},title.eq.${title}`)
    if(check && check.length>0){ msg.innerHTML="الاسم أو العنوان مستخدم مسبقاً"; return }

    let code = localStorage.getItem("studentCode")
    if(!code){
        let unique = false
        while(!unique){
            code = generateCode()
            const {data:codeCheck} = await supabase.from("student_reports").select("*").eq("code", code)
            if(!codeCheck || codeCheck.length===0) unique = true
        }
        localStorage.setItem("studentCode", code)
    }

    const now = new Date().toISOString()
    const {error} = await supabase.from("student_reports").insert([{name,title,subject,date:now, code}])
    if(error){ msg.innerHTML="فشل الحفظ"; console.log(error); return }

    msg.innerHTML="تم حفظ البيانات بنجاح"
    await showMyInfo()
    await showAll()
}

async function changeTitle(){
    const name = document.getElementById("studentName").value.trim()
    const msg = document.getElementById("msg")
    if(!name){ msg.innerHTML="ادخل اسمك"; return }
    const newTitle = prompt("ادخل العنوان الجديد")
    if(!newTitle) return
    const now = new Date().toISOString()
    const code = localStorage.getItem("studentCode")
    const {error} = await supabase.from("student_reports").update({title:newTitle,date:now}).eq("code", code)
    if(error){ msg.innerHTML="فشل التحديث"; console.log(error); return }
    msg.innerHTML="تم تغيير العنوان"
    await showMyInfo()
    await showAll()
}

async function showMyInfo(){
    const code = localStorage.getItem("studentCode")
    const infoBox = document.getElementById("infoBox")
    const msg = document.getElementById("msg")
    if(!code){ msg.innerHTML="لم يتم إدخال بياناتك بعد"; return }
    const {data,error} = await supabase.from("student_reports").select("*").eq("code", code).single()
    if(error || !data){ msg.innerHTML="لا توجد بيانات"; return }
    infoBox.innerHTML = `<h4>معلومات الطالب</h4>
        <p><strong>الاسم:</strong> ${data.name}</p>
        <p><strong>العنوان:</strong> ${data.title}</p>
        <p><strong>المادة:</strong> ${data.subject}</p>
        <p><strong>التاريخ:</strong> ${formatDate(data.date)}</p>`
}

async function showAll(){
    const {data,error} = await supabase.from("student_reports").select("*").order("id",{ascending:true})
    const container = document.getElementById("allTitles")
    const code = localStorage.getItem("studentCode")
    if(error){ container.innerHTML="فشل تحميل البيانات"; return }
    let html = "<h3>جميع العناوين</h3><ul>"
    data.forEach((d,i)=>{
        const highlight = d.code===code ? "highlight" : ""
        html+=`<li class="${highlight}">
            <span class="time">${formatDate(d.date)}</span>
            <span class="info">${i+1}. ${d.name} | ${d.title} | ${d.subject}</span>
        </li>`
    })
    html+="</ul>"
    container.innerHTML = html
}

async function deleteMyData(){
    const code = localStorage.getItem("studentCode")
    const msg = document.getElementById("msg")
    const infoBox = document.getElementById("infoBox")
    if(!code){ msg.innerHTML="لم يتم إدخال بياناتك بعد"; return }
    const {error} = await supabase.from("student_reports").delete().eq("code",code)
    if(error){ msg.innerHTML="فشل الحذف"; console.log(error); return }
    msg.innerHTML="تم حذف بياناتك"
    infoBox.innerHTML = ""
    localStorage.removeItem("studentCode")
    await showAll()
}

window.saveData = saveData
window.changeTitle = changeTitle
window.showAll = showAll
window.showMyInfo = showMyInfo
window.deleteMyData = deleteMyData
</script>

</body>
</html>
