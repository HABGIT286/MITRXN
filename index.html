<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<title>عناوين تقارير الطلبة</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

.header{
text-align:center;
font-size:30px;
padding:20px;
background:#1e3a5f;
color:white;
}

.container{
width:500px;
margin:80px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

.save{background:#1e3a5f;color:white;}
.change{background:#b38b00;color:white;}
.info{background:#006b38;color:white;}
.show{background:#8b0000;color:white;}
.delete{background:#aa0000;color:white;}

#msg{
margin-top:10px;
font-weight:bold;
text-align:center;
}

#allTitles{
margin-top:20px;
}

</style>
</head>

<body>

<div class="header">عناوين تقارير الطلبة</div>

<div class="container">

<input id="studentName" placeholder="اسم الطالب الثلاثي">
<input id="reportTitle" placeholder="عنوان التقرير">
<input id="subjectName" placeholder="المادة الدراسية">

<button class="save" onclick="saveData()">حفظ</button>

<button class="change" onclick="changeTitle()">تغيير عنوان التقرير</button>

<button class="info" onclick="showMyInfo()">معلوماتي</button>

<button class="show" onclick="showAll()">عناوين الطلبة</button>

<button class="delete" onclick="deleteMyData()">حذف معلوماتي</button>

<div id="msg"></div>

<div id="allTitles"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = "https://mcwemgjmqwbgxoyiwant.supabase.co"

const SUPABASE_KEY = "sb_publishable_qmIUC4Rkb-VGOek8qkVqFg_Sn4x3WjI"

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

async function saveData(){

const name=document.getElementById("studentName").value.trim()
const title=document.getElementById("reportTitle").value.trim()
const subject=document.getElementById("subjectName").value.trim()

const msg=document.getElementById("msg")

if(name.split(" ").length<3){

msg.innerHTML="الاسم يجب ان يكون ثلاثي"

return

}

if(!name||!title||!subject){

msg.innerHTML="املأ جميع الحقول"

return

}

const {data:check}=await supabase

.from("student_reports")

.select("*")

.or(`name.eq.${name},title.eq.${title}`)

if(check&&check.length>0){

msg.innerHTML="الاسم او العنوان مستخدم مسبقاً"

return

}

const date=new Date().toLocaleString()

const {error}=await supabase

.from("student_reports")

.insert([{name,title,subject,date}])

if(error){

msg.innerHTML="فشل الحفظ"

console.log(error)

return

}

msg.innerHTML="تم حفظ البيانات بنجاح"

}

async function changeTitle(){

const name=document.getElementById("studentName").value.trim()

if(!name){

alert("ادخل اسمك")

return

}

const newTitle=prompt("ادخل العنوان الجديد")

if(!newTitle)return

const {error}=await supabase

.from("student_reports")

.update({title:newTitle})

.eq("name",name)

if(error){

alert("فشل التحديث")

console.log(error)

return

}

document.getElementById("msg").innerHTML="تم تغيير العنوان"

}

async function showMyInfo(){

const name=document.getElementById("studentName").value.trim()

if(!name){

alert("ادخل اسمك")

return

}

const {data,error}=await supabase

.from("student_reports")

.select("*")

.eq("name",name)

.single()

if(error||!data){

alert("لا توجد بيانات")

return

}

alert(

"اسم الطالب: "+data.name+"\n"+

"العنوان: "+data.title+"\n"+

"المادة: "+data.subject+"\n"+

"التاريخ: "+data.date

)

}

async function showAll(){

const {data,error}=await supabase

.from("student_reports")

.select("*")

.order("id",{ascending:true})

const container=document.getElementById("allTitles")

if(error){

container.innerHTML="فشل تحميل البيانات"

return

}

let html="<h3>جميع العناوين</h3><ul>"

data.forEach(d=>{

html+=`<li>${d.id} - ${d.name} | ${d.title} | ${d.subject} | ${d.date}</li>`

})

html+="</ul>"

container.innerHTML=html

}

async function deleteMyData(){

const name=document.getElementById("studentName").value.trim()

if(!name){

alert("ادخل اسمك")

return

}

const {error}=await supabase

.from("student_reports")

.delete()

.eq("name",name)

if(error){

alert("فشل الحذف")

console.log(error)

return

}

document.getElementById("msg").innerHTML="تم حذف بياناتك"

}

window.saveData=saveData
window.changeTitle=changeTitle
window.showMyInfo=showMyInfo
window.showAll=showAll
window.deleteMyData=deleteMyData

</script>

</body>
</html>
