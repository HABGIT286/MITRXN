<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>عناوين تقارير الطلبة</title>

<style>
@font-face { font-family: 'TitelFont'; src: url('TITEL.ttf'); }
@font-face { font-family: 'WriteFont'; src: url('WRITE.otf'); }

body{
    margin:0;
    font-family:'WriteFont',sans-serif;
    background: url('H.jpg') no-repeat center center fixed;
    background-size: cover;
}

.header{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    padding:20px;
    background:#1e3a5f;
    color:white;
    font-family:'TitelFont',sans-serif;
}

.top-right{
    position:absolute;
    top:20px;
    left:20px;
    font-size:14px;
}

.container{
    width:500px;
    margin:100px auto;
    background:rgba(255,255,255,0.95);
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.rank{
    text-align:center;
    margin-bottom:20px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-bottom:10px;
    cursor:pointer;
}

.save-btn{background:#1e3a5f;color:white;}
.change-btn{background:#b38b00;color:white;}
.info-btn{background:#006b38;color:white;}
.show-titles-btn{background:#5a2e8a;color:white;}

#msg{margin-top:10px;font-weight:bold;}
</style>
</head>
<body>

<div class="header">عناوين تقارير الطلبة</div>

<div class="top-right">
قسم إدارة الأعمال<br>
طلبة المرحلة الثانية<br>
الدراسة مسائي<br>
قاعة (ب)
</div>

<div class="container">

<div class="rank">رتبتك هنا</div>

<input id="studentName" placeholder="اسم الطالب">
<input id="reportTitle" placeholder="عنوان التقرير">
<input id="subjectName" placeholder="المادة الدراسية">

<button class="save-btn" onclick="saveData()">حفظ</button>
<button class="change-btn" onclick="changeTitle()">تغيير اسم العنوان</button>
<button class="info-btn" onclick="showMyInfo()">معلوماتي</button>
<button class="show-titles-btn" onclick="showAllTitles()">إظهار العناوين</button>

<div id="msg"></div>

</div>

<script>

// حفظ البيانات في السيرفر
async function saveData(){
    const name = document.getElementById("studentName").value.trim();
    const title = document.getElementById("reportTitle").value.trim();
    const subject = document.getElementById("subjectName").value.trim();
    const msg = document.getElementById("msg");

    if(!name || !title || !subject){
        msg.innerHTML = "<span style='color:red'>املأ جميع الحقول</span>";
        return;
    }

    try{
        const res = await fetch("/api/students",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ name, title, subject })
        });

        const result = await res.json();

        if(result.ok){
            msg.innerHTML = "<span style='color:green'>تم الحفظ بنجاح</span>";
        }else{
            msg.innerHTML = `<span style='color:red'>${result.message}</span>`;
        }

    }catch(e){
        msg.innerHTML = "<span style='color:red'>خطأ في الاتصال بالسيرفر</span>";
    }
}


// تغيير العنوان (يرسل تحديث للسيرفر)
async function changeTitle(){
    const newTitle = prompt("ادخل العنوان الجديد");
    if(!newTitle) return;

    const name = document.getElementById("studentName").value.trim();
    const subject = document.getElementById("subjectName").value.trim();

    if(!name || !subject){
        alert("ادخل اسمك والمادة أولاً");
        return;
    }

    try{
        const res = await fetch("/api/students",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ name, title:newTitle, subject })
        });

        const result = await res.json();

        if(result.ok){
            document.getElementById("reportTitle").value = newTitle;
            alert("تم تغيير العنوان");
        }else{
            alert(result.message);
        }

    }catch(e){
        alert("خطأ في الاتصال بالسيرفر");
    }
}


// عرض معلومات الطالب
async function showMyInfo(){
    const name = document.getElementById("studentName").value.trim();
    if(!name){
        alert("ادخل اسمك أولاً");
        return;
    }

    const res = await fetch("/api/students");
    const result = await res.json();

    if(!result.ok){
        alert("خطأ في جلب البيانات");
        return;
    }

    const student = result.students.find(s => s.name === name);

    if(!student){
        alert("لم يتم تسجيلك بعد");
        return;
    }

    alert(
        "اسم الطالب: " + student.name +
        "\nعنوان التقرير: " + student.title +
        "\nالمادة: " + student.subject +
        "\nالتاريخ: " + student.date
    );
}


// عرض جميع الطلبة
async function showAllTitles(){

    const res = await fetch("/api/students");
    const result = await res.json();

    if(!result.ok || result.students.length === 0){
        alert("لا توجد بيانات بعد");
        return;
    }

    let list = result.students
        .map(s => `👤 ${s.name} | 📝 ${s.title}`)
        .join("\n");

    alert(list);
}

</script>

</body>
</html>
