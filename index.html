<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>لوحة تحكم الطلبة</title>
<style>
@font-face { font-family: 'TitelFont'; src: url('TITEL.ttf'); }
@font-face { font-family: 'WriteFont'; src: url('WRITE.otf'); }

body{
    margin:0;
    font-family:'WriteFont',sans-serif;
    overflow: hidden;
    position: relative;
    background: #000;
}

#bgVideo{
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    z-index: -1;
    object-fit: cover;
}

.container{
    width:650px;
    margin:80px auto;
    background: rgba(255,255,255,0.8);
    padding:30px;
    border-radius:15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.6);
    font-family:'WriteFont',sans-serif;
    backdrop-filter: blur(5px);
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid rgba(0,0,0,0.3);
    font-family:'WriteFont',sans-serif;
    background: rgba(255,255,255,0.6);
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
}

button{
    width:48%;
    padding:12px;
    margin:5px 1%;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-family:'WriteFont',sans-serif;
    color:white;
    background: rgba(30,58,95,0.7);
    box-shadow: 0 6px 15px rgba(0,0,0,0.5);
    transition: all 0.2s ease-in-out;
}

button:hover{
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 10px 20px rgba(0,0,0,0.6);
}

button:active{
    transform: translateY(1px) scale(0.98);
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

#msg{
    margin-top:10px;
    font-weight:bold;
    text-align:center;
    color:#222;
    text-shadow: 1px 1px 4px rgba(255,255,255,0.7);
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

td,th{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
    background: rgba(255,255,255,0.6);
}

</style>
</head>

<body>

<video autoplay muted loop id="bgVideo">
    <source src="V.mp4" type="video/mp4">
    متصفحك لا يدعم عرض الفيديو.
</video>

<div class="container">
<h2>لوحة تحكم الطلبة</h2>

<input id="studentName" placeholder="اسم الطالب الثنائي">
<input id="reportTitle" placeholder="عنوان التقرير">
<input id="subjectName" placeholder="المادة الدراسية">

<br>
<button onclick="saveData()">➕ حفظ</button>
<button onclick="updateData()">✏ تعديل</button>

<div id="msg"></div>

<h3>قائمة الطلبة</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>الاسم</th>
<th>العنوان</th>
<th>المادة</th>
<th>التاريخ</th>
<th>تحكم</th>
</tr>
</thead>
<tbody id="studentsTable"></tbody>
</table>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL="https://mcwemgjmqwbgxoyiwant.supabase.co"
const SUPABASE_KEY="sb_publishable_qmIUC4Rkb-VGOek8qkVqFg_Sn4x3WjI"
const supabase=createClient(SUPABASE_URL,SUPABASE_KEY)

let selectedID=null

function formatDate(ts){
    if(!ts) return ""
    const d=new Date(ts)
    return `${d.getHours()}:${d.getMinutes()} (${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()})`
}

async function saveData(){
    const name=document.getElementById("studentName").value.trim()
    const title=document.getElementById("reportTitle").value.trim()
    const subject=document.getElementById("subjectName").value.trim()
    const msg=document.getElementById("msg")

    if(name.split(/\s+/).length<2){ msg.innerHTML="الاسم يجب أن يكون ثنائي"; return }
    if(!name||!title||!subject){ msg.innerHTML="املأ جميع الحقول"; return }

    // تحقق من تكرار الاسم أو العنوان
    const {data:check} = await supabase.from("student_reports").select("*").or(`name.eq.${name},title.eq.${title}`)
    if(check && check.length>0){ msg.innerHTML="الاسم أو العنوان مستخدم مسبقاً"; return }

    const now=new Date().toISOString()
    const {error}=await supabase.from("student_reports").insert([{name,title,subject,date:now}])
    if(error){ msg.innerHTML="فشل الحفظ"; console.log(error); return }

    msg.innerHTML="تم إضافة الطالب بنجاح"
    clearInputs()
    loadStudents()
}

function editStudent(student){
    selectedID=student.id
    document.getElementById("studentName").value=student.name
    document.getElementById("reportTitle").value=student.title
    document.getElementById("subjectName").value=student.subject
}

async function updateData(){
    if(!selectedID){ alert("اختر طالب للتعديل"); return }

    const name=document.getElementById("studentName").value.trim()
    const title=document.getElementById("reportTitle").value.trim()
    const subject=document.getElementById("subjectName").value.trim()
    const msg=document.getElementById("msg")

    if(!name||!title||!subject){ msg.innerHTML="املأ جميع الحقول"; return }

    const {data:check} = await supabase.from("student_reports").select("*").or(`name.eq.${name},title.eq.${title}`).neq("id", selectedID)
    if(check && check.length>0){ msg.innerHTML="الاسم أو العنوان مستخدم مسبقاً"; return }

    const now=new Date().toISOString()
    const {error}=await supabase.from("student_reports").update({name,title,subject,date:now}).eq("id",selectedID)
    if(error){ msg.innerHTML="فشل التعديل"; console.log(error); return }

    msg.innerHTML="تم تعديل بيانات الطالب"
    clearInputs()
    loadStudents()
}

async function deleteStudent(id){
    if(!confirm("هل تريد حذف الطالب؟")) return
    const {error}=await supabase.from("student_reports").delete().eq("id",id)
    if(error){ console.log(error); alert("فشل الحذف") }
}

async function loadStudents(){
    const {data,error}=await supabase.from("student_reports").select("*").order("id",{ascending:true})
    if(error){ console.log(error); return }
    const table=document.getElementById("studentsTable")
    table.innerHTML=""
    data.forEach((s,i)=>{
        table.innerHTML+=`
        <tr>
        <td>${i+1}</td>
        <td>${s.name}</td>
        <td>${s.title}</td>
        <td>${s.subject}</td>
        <td>${formatDate(s.date)}</td>
        <td>
        <button onclick='editStudent(${JSON.stringify(s)})'>تعديل</button>
        <button onclick='deleteStudent(${s.id})'>حذف</button>
        </td>
        </tr>
        `
    })
}

// Realtime التحديث التلقائي
supabase.channel("students_channel")
.on("postgres_changes",{event:"*",schema:"public",table:"student_reports"},payload=>{
    loadStudents()
})
.subscribe()

function clearInputs(){
    document.getElementById("studentName").value=""
    document.getElementById("reportTitle").value=""
    document.getElementById("subjectName").value=""
    selectedID=null
}

window.saveData=saveData
window.updateData=updateData
window.editStudent=editStudent
window.deleteStudent=deleteStudent

loadStudents()
</script>

</body>
</html>
